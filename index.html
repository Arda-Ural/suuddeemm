<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudem'e Özel ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #ffeef8 0%, #ffd1dc 100%); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; position: relative; }
        .heart { position: absolute; color: rgba(214, 51, 132, 0.2); font-size: 20px; animation: float 6s linear infinite; z-index: 1; }
        @keyframes float { 0% { transform: translateY(100vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }
        .container { text-align: center; background: rgba(255, 255, 255, 0.9); padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(214, 51, 132, 0.2); width: 350px; position: relative; z-index: 10; backdrop-filter: blur(5px); border: 2px solid white; }
        #baby-img { width: 240px; height: 240px; border-radius: 25px; object-fit: cover; border: 4px solid #ffb6c1; margin-bottom: 25px; transition: all 0.5s ease; box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        h1 { color: #d63384; font-size: 22px; margin-bottom: 25px; font-weight: 600; }
        .buttons { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .btn { padding: 12px 28px; font-size: 16px; border: none; border-radius: 50px; cursor: pointer; font-weight: 600; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #yes-btn { background-color: #4caf50; color: white; z-index: 9999; }
        #no-btn { background-color: #f44336; color: white; }
        #message { display: none; font-family: 'Dancing Script', cursive; font-size: 32px; color: #2e7d32; margin-top: 20px; animation: fadeIn 1s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <img src="huzunlu.jpg" id="baby-img">
