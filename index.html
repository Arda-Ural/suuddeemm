<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudem'e Özel ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Dancing+Script:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #d63384; --light-pink: #ffd1dc; --glow: rgba(214, 51, 132, 0.4); }
        
        body, html { height: 100%; margin: 0; overflow: hidden; font-family: 'Poppins', sans-serif; cursor: crosshair; }
        
        /* 4. SEÇENEK: Sinematik Hareketli Arka Plan */
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            overflow: hidden;
        }
        .bg-image {
            width: 100%; height: 100%;
            background-image: url('sudem.jpg');
            background-size: cover; background-position: center;
            filter: blur(6px) brightness(0.6);
            transform: scale(1.1);
            animation: panBg 20s ease-in-out infinite alternate;
        }
        @keyframes panBg { 0% { transform: scale(1.1); } 100% { transform: scale(1.2) rotate(1deg); } }

        body { display: flex; justify-content: center; align-items: center; perspective: 1000px; }

        /* Konteyner */
        .container { 
            text-align: center; background: rgba(255, 255, 255, 0.82); 
            padding: 50px; border-radius: 40px; 
            box-shadow: 0 0 40px var(--glow), 0 25px 60px rgba(0, 0, 0, 0.4); 
            width: 380px; position: relative; z-index: 10;
            backdrop-filter: blur(8px); border: 2px solid rgba(255,255,255,0.7);
            transition: transform 0.1s ease-out;
        }

        #baby-img { 
            width: 250px; height: 250px; border-radius: 30px; 
            object-fit: cover; border: 5px solid white; 
            margin-bottom: 25px; transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        h1 { color: var(--pink); font-size: 24px; min-height: 65px; font-weight: 600; margin-bottom: 25px; }

        .buttons { display: flex; justify-content: center; align-items: center; gap: 20px; }

        .btn { 
            padding: 14px 35px; font-size: 18px; border: none; border-radius: 50px; 
            cursor: pointer; font-weight: 600; transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        #yes-btn { background: linear-gradient(45deg, #4caf50, #81c784); color: white; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        #no-btn { background: #f44336; color: white; }

        #message { 
            display: none; font-family: 'Dancing Script', cursive; 
            font-size: 40px; color: #2e7d32; margin-top: 20px; 
            animation: celebrate 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* İMZA ALANI (Ardan 🤍) */
        .signature {
            position: absolute; bottom: -60px; left: 0; right: 0;
            font-family: 'Great Vibes', cursive; color: white;
            font-size: 26px; opacity: 0.8; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            animation: fadeInSignature 2s ease forwards;
        }
        @keyframes fadeInSignature { from { opacity: 0; transform: translateY(10px); } to { opacity: 0.8; transform: translateY(0); } }

        /* 2. SEÇENEK: Tıklama Efekti Kalbi */
        .click-heart {
            position: absolute; color: #ff4d6d; pointer-events: none;
            font-size: 20px; animation: heartFly 1s ease-out forwards; z-index: 100;
        }
        @keyframes heartFly {
            0% { transform: scale(1) translateY(0); opacity: 1; }
            100% { transform: scale(2) translateY(-100px); opacity: 0; }
        }

        @keyframes celebrate { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="bg-container"><div class="bg-image"></div></div>

    <div class="container" id
